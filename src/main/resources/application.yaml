spring:
  application:
    name: SubTracker Lite

  mvc:
    problemdetails:
      enabled: true
      
  datasource:
    url: jdbc:postgresql://localhost:5432/subtracker
    username: subtracker
    password: subtracker
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
