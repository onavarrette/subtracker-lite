name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Aunque Spring Boot 4 levanta Docker automáticamente, 
      # GitHub necesita tener el demonio de Docker listo.
      docker:
        image: docker:dind
        options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin' # Distribución recomendada para Java moderno
        cache: maven

    - name: Build and Run Tests
      run: ./mvnw clean test
      env:
        # Esto asegura que Spring encuentre el entorno Docker en la nube
        DOCKER_HOST: unix:///var/run/docker.sock